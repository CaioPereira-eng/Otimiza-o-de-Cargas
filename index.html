<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CargoFit - Otimizador de Cargas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #14171f;
    --surface2: #1c2030;
    --border: #272c3d;
    --accent: #f5c518;
    --accent2: #ff6b35;
    --text: #e8eaf0;
    --text-muted: #5a6080;
    --truck-bg: #1a2035;
    --truck-border: #2a3555;
    --success: #3dd68c;
    --danger: #ff4d6d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  header .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  header .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  header .badge {
    margin-left: auto;
    background: var(--accent);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .app {
    display: grid;
    grid-template-columns: 420px 1fr;
    height: calc(100vh - 64px);
  }

  .panel-left {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-section {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .panel-section h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .truck-config {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .field-group label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
  }
  .field-group input, .field-group select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field-group input:focus, .field-group select:focus {
    border-color: var(--accent);
  }
  .field-group.full { grid-column: 1/-1; }

  .cargo-section {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 20px 24px;
  }
  .cargo-section h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .cargo-header {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    padding: 0 0 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .cargo-header span {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .cargo-header .h-desc { flex: 2; }
  .cargo-header .h-num { flex: 1; text-align: center; }

  .cargo-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .cargo-row {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .cargo-row input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s;
  }
  .cargo-row input:focus { border-color: var(--accent); }
  .cargo-row input.inp-desc { flex: 2; }
  .cargo-row input.inp-num { flex: 1; text-align: center; }
  .cargo-row .btn-del {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    font-size: 16px;
    line-height: 1;
    transition: color 0.2s;
  }
  .cargo-row .btn-del:hover { color: var(--danger); }

  .cargo-actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  .btn {
    padding: 9px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary {
    background: var(--accent);
    color: #000;
    font-weight: 600;
  }
  .btn-primary:hover { background: #ffd740; transform: translateY(-1px); }
  .btn-run {
    width: 100%;
    padding: 14px;
    font-size: 14px;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 3px;
    font-weight: 400;
  }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #ff6b85; }

  .panel-right {
    overflow-y: auto;
    padding: 24px 28px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 18px;
    flex: 1;
    text-align: center;
  }
  .stat-card .val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--accent);
    line-height: 1;
  }
  .stat-card .lbl {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .stat-card.good .val { color: var(--success); }
  .stat-card.warn .val { color: var(--accent2); }

  .trucks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
  .truck-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .truck-card-header {
    background: var(--surface2);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .truck-card-header .truck-id {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--text);
  }
  .truck-card-header .truck-id span { color: var(--accent); }
  .truck-util {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 2px;
  }
  .truck-util.high { background: rgba(61,214,140,0.15); color: var(--success); }
  .truck-util.mid { background: rgba(245,197,24,0.15); color: var(--accent); }
  .truck-util.low { background: rgba(255,75,109,0.15); color: var(--danger); }

  .truck-canvas-wrap {
    padding: 14px;
  }
  canvas.truck-canvas {
    display: block;
    width: 100%;
    border-radius: 3px;
    background: var(--truck-bg);
  }

  .truck-cargo-list {
    padding: 0 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .cargo-item-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .cargo-item-row .dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .cargo-item-row .ci-name {
    flex: 1;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cargo-item-row .ci-dim {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60%;
    gap: 12px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; opacity: 0.3; }
  .empty-state p { font-family: 'DM Mono', monospace; font-size: 12px; text-align: center; letter-spacing: 0.5px; }

  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 4px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .upload-zone:hover { border-color: var(--accent); color: var(--accent); background: rgba(245,197,24,0.04); }
  #file-input { display: none; }

  .tip {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 6px;
    padding: 6px 10px;
    background: var(--bg);
    border-left: 2px solid var(--accent);
    border-radius: 0 3px 3px 0;
  }

  .rotate-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }
  .rotate-toggle input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; }
  .rotate-toggle label { font-size: 12px; color: var(--text-muted); cursor: pointer; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">🚛 CargoFit</div>
    <div class="subtitle">Otimizador de Posicionamento de Cargas</div>
  </div>
  <div class="badge">Maximal Rectangles</div>
</header>

<div class="app">
  <div class="panel-left">
    <div class="panel-section">
      <h3>Configuracao da Carreta</h3>
      <div class="truck-config">
        <div class="field-group">
          <label>Comprimento (m)</label>
          <input type="number" id="truck-c" value="14" step="0.1" min="1">
        </div>
        <div class="field-group">
          <label>Largura (m)</label>
          <input type="number" id="truck-l" value="2.6" step="0.1" min="0.5">
        </div>
        <div class="field-group">
          <label>Peso Max. (t)</label>
          <input type="number" id="truck-w" value="30" step="0.5" min="1">
        </div>
        <div class="field-group">
          <label>Margem (m)</label>
          <input type="number" id="truck-margin" value="0.1" step="0.05" min="0">
        </div>
      </div>
      <div class="rotate-toggle">
        <input type="checkbox" id="allow-rotate" checked>
        <label for="allow-rotate">Permitir rotacao 90</label>
      </div>
      <div class="tip">Padrao: 14m x 2,6m, 30t</div>
    </div>

    <div class="cargo-section">
      <h3>Lista de Cargas</h3>
      <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        Importar planilha
      </div>
      <input type="file" id="file-input" accept=".xlsx,.xls,.csv,.txt">
      <div class="tip" style="margin-bottom:10px">Excel/CSV: Desc, C, L, A, P, Qtd</div>

      <div class="cargo-header">
        <span class="h-desc">Descricao</span>
        <span class="h-num">C (m)</span>
        <span class="h-num">L (m)</span>
        <span class="h-num">P (t)</span>
        <span class="h-num">Qtd</span>
        <span style="width:24px"></span>
      </div>

      <div class="cargo-list" id="cargo-list"></div>

      <div class="cargo-actions">
        <button class="btn btn-ghost" onclick="addCargoRow()">+ Adicionar</button>
        <button class="btn btn-ghost" onclick="clearAll()">Limpar</button>
        <button class="btn btn-ghost" onclick="loadExample()">Exemplo</button>
      </div>

      <div style="margin-top:14px">
        <button class="btn btn-primary btn-run" onclick="runOptimization()">Otimizar</button>
      </div>
    </div>
  </div>

  <div class="panel-right" id="results-panel">
    <div class="empty-state">
      <div class="icon">🚛</div>
      <p>Configure as cargas e clique em Otimizar</p>
    </div>
  </div>
</div>

<script>
const PALETTE = ['#f5c518','#ff6b35','#3dd68c','#4f8ef7','#e040fb','#00bcd4','#ff5252','#69f0ae','#ffab40','#b388ff','#80deea','#f48fb1','#a5d6a7','#fff176','#90caf9','#ffcc80','#ef9a9a','#80cbc4','#ce93d8','#ffe082'];

let cargoRows = [];
let rowId = 0;

function addCargoRow(desc, c, l, p, qty) {
  if (desc === undefined) desc = '';
  if (c === undefined) c = '';
  if (l === undefined) l = '';
  if (p === undefined) p = '';
  if (qty === undefined) qty = '1';
  
  const id = rowId++;
  cargoRows.push(id);
  const list = document.getElementById('cargo-list');
  const div = document.createElement('div');
  div.className = 'cargo-row';
  div.id = 'row-' + id;
  
  const html = '<input class="inp-desc" type="text" placeholder="Descricao" value="' + desc + '" data-field="desc">' +
    '<input class="inp-num" type="number" placeholder="C" value="' + c + '" step="0.01" min="0" data-field="c">' +
    '<input class="inp-num" type="number" placeholder="L" value="' + l + '" step="0.01" min="0" data-field="l">' +
    '<input class="inp-num" type="number" placeholder="P" value="' + p + '" step="0.01" min="0" data-field="p">' +
    '<input class="inp-num" type="number" placeholder="Qtd" value="' + qty + '" step="1" min="1" data-field="qty">' +
    '<button class="btn-del" onclick="removeRow(' + id + ')">x</button>';
  
  div.innerHTML = html;
  list.appendChild(div);
}

function removeRow(id) {
  const el = document.getElementById('row-' + id);
  if (el) el.remove();
  cargoRows = cargoRows.filter(function(r) { return r !== id; });
}

function clearAll() {
  document.getElementById('cargo-list').innerHTML = '';
  cargoRows = [];
  rowId = 0;
}

function getCargoData() {
  const items = [];
  document.querySelectorAll('.cargo-row').forEach(function(row) {
    const desc = row.querySelector('[data-field="desc"]').value.trim() || 'Carga';
    const c = parseFloat(row.querySelector('[data-field="c"]').value);
    const l = parseFloat(row.querySelector('[data-field="l"]').value);
    const p = parseFloat(row.querySelector('[data-field="p"]').value) || 0;
    const qty = parseInt(row.querySelector('[data-field="qty"]').value) || 1;
    if (!isNaN(c) && c > 0 && !isNaN(l) && l > 0) {
      for (let i = 0; i < qty; i++) {
        items.push({ desc: qty > 1 ? desc + ' (' + (i+1) + ')' : desc, c: c, l: l, p: p, orig: desc });
      }
    }
  });
  return items;
}

function loadExample() {
  clearAll();
  const ex = [
    ['Transformer', 8.2, 3.8, 174, 1],
    ['Cooler 1', 3.12, 2.42, 1.35, 1],
    ['HV Casing', 7.87, 1.05, 2.55, 1],
    ['Conservator', 4.12, 1.97, 4, 1],
  ];
  ex.forEach(function(item) {
    addCargoRow(item[0], item[1], item[2], item[3], item[4]);
  });
}

document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const ext = file.name.split('.').pop().toLowerCase();

  if (ext === 'xlsx' || ext === 'xls') {
    const reader = new FileReader();

    reader.onload = function(ev) {
      try {
        const data = new Uint8Array(ev.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, {
          header: 1,
          defval: ''
        });

        clearAll();

        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          const desc = String(row[0] || '').trim();
          const c = parseFloat(row[1]);
          const l = parseFloat(row[2]);
          const p = parseFloat(row[4]) || 0;
          const qty = parseInt(row[5]) || 1;

          if (desc && !isNaN(c) && c > 0 && !isNaN(l) && l > 0) {
            addCargoRow(desc.substring(0, 50), c, l, p, qty);
          }
        }

        if (cargoRows.length === 0) {
          alert('Nenhuma linha valida encontrada.');
        }

      } catch(err) {
        alert('Erro ao ler Excel: ' + err.message);
      }
    };

    reader.readAsArrayBuffer(file);
    return;
  }

  const reader = new FileReader();

  reader.onload = function(ev) {
    try {
      const text = ev.target.result;
      const lines = text.split(/\r?\n/).filter(function(l) { return l.trim(); });
      clearAll();

      for (let i = 1; i < lines.length; i++) {
        const parts = parseDelimitedLine(lines[i], '\t');

        if (parts.length >= 5) {
          const desc = parts[0].trim();
          const c = parseFloat(parts[1]);
          const l = parseFloat(parts[2]);
          const p = parseFloat(parts[4]) || 0;
          const qty = parseInt(parts[5]) || 1;

          if (desc && !isNaN(c) && c > 0 && !isNaN(l) && l > 0) {
            addCargoRow(desc, c, l, p, qty);
          }
        }
      }

      if (cargoRows.length === 0) {
        alert('Nenhuma linha valida encontrada.');
      }

    } catch(err) {
      alert('Erro ao importar: ' + err.message);
    }
  };

  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
});

function parseDelimitedLine(line, delimiter) {
  const result = [];
  let current = '';
  let insideQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];

    if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === delimiter && !insideQuotes) {
      result.push(current.trim().replace(/"/g, ''));
      current = '';
    } else {
      current += char;
    }
  }
  result.push(current.trim().replace(/"/g, ''));
  return result;
}

class MaximalRectangle {
  constructor(x, y, w, h) {
    this.x = x;
    this.y = y;
    this.w = w;
    this.h = h;
    this.area = w * h;
  }
}

function pack2DMaximalRectangles(items, truckC, truckL, truckMaxW, margin, allowRotate) {
  const sorted = items.slice().sort(function(a, b) { return (b.c * b.l) - (a.c * a.l); });
  const trucks = [];

  for (let idx = 0; idx < sorted.length; idx++) {
    const item = sorted[idx];
    let placed = false;

    for (let ti = 0; ti < trucks.length; ti++) {
      if (tryPlaceMaximal(trucks[ti], item, truckC, truckL, truckMaxW, margin, allowRotate)) {
        placed = true;
        break;
      }
    }

    if (!placed) {
      const newTruck = {
        maxRects: [new MaximalRectangle(0, 0, truckC, truckL)],
        items: [],
        weightUsed: 0
      };
      if (tryPlaceMaximal(newTruck, item, truckC, truckL, truckMaxW, margin, allowRotate)) {
        trucks.push(newTruck);
      } else {
        trucks.push({
          maxRects: [],
          items: [{x: 0, y: 0, w: item.c, h: item.l, desc: item.desc, c: item.c, l: item.l, p: item.p, oversized: true}],
          weightUsed: item.p
        });
      }
    }
  }

  return trucks;
}

function tryPlaceMaximal(truck, item, truckC, truckL, truckMaxW, margin, allowRotate) {
  if (truck.weightUsed + item.p > truckMaxW) return false;

  const m = margin;
  const variants = [[item.c, item.l]];
  if (allowRotate && Math.abs(item.c - item.l) > 0.01) {
    variants.push([item.l, item.c]);
  }

  let bestRect = null, bestVariant = null, bestScore = Infinity;

  for (let vi = 0; vi < variants.length; vi++) {
    const w = variants[vi][0];
    const h = variants[vi][1];
    for (let ri = 0; ri < truck.maxRects.length; ri++) {
      const rect = truck.maxRects[ri];
      if (w + m * 2 <= rect.w && h + m * 2 <= rect.h) {
        const wastedArea = (rect.w - w) * (rect.h - h);
        if (wastedArea < bestScore) {
          bestScore = wastedArea;
          bestRect = rect;
          bestVariant = [w, h];
        }
      }
    }
  }

  if (!bestRect || !bestVariant) return false;

  const w = bestVariant[0];
  const h = bestVariant[1];
  const px = bestRect.x + m;
  const py = bestRect.y + m;

  truck.items.push({ x: px, y: py, w: w, h: h, desc: item.desc, c: item.c, l: item.l, p: item.p });
  truck.weightUsed += item.p;

  truck.maxRects = truck.maxRects.filter(function(r) { return r !== bestRect; });

  const newRects = [];

  if (bestRect.x + w + m < bestRect.x + bestRect.w) {
    newRects.push(new MaximalRectangle(bestRect.x + w + m, bestRect.y, bestRect.w - w - m, bestRect.h));
  }

  if (bestRect.y + h + m < bestRect.y + bestRect.h) {
    newRects.push(new MaximalRectangle(bestRect.x, bestRect.y + h + m, bestRect.w, bestRect.h - h - m));
  }

  for (let i = 0; i < newRects.length; i++) {
    truck.maxRects = truck.maxRects.filter(function(r) { return !isOccluded(r, newRects[i]); });
    truck.maxRects.push(newRects[i]);
  }

  truck.maxRects.sort(function(a, b) { return b.area - a.area; });

  return true;
}

function isOccluded(rect, newRect) {
  return rect.x >= newRect.x && rect.y >= newRect.y &&
         rect.x + rect.w <= newRect.x + newRect.w &&
         rect.y + rect.h <= newRect.y + newRect.h &&
         (rect.x !== newRect.x || rect.y !== newRect.y);
}

function drawTruck(canvas, truck, truckC, truckL) {
  const scale = Math.min((canvas.offsetWidth * 2) / truckC, 160 / truckL);
  canvas.width = Math.round(truckC * scale);
  canvas.height = Math.round(truckL * scale);
  canvas.style.height = (canvas.height / 2) + 'px';

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#10162a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  const grid = 1 * scale;
  for (let x = 0; x <= canvas.width; x += grid) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= canvas.height; y += grid) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  ctx.strokeStyle = '#2a3a6a';
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);

  for (let i = 0; i < truck.items.length; i++) {
    const item = truck.items[i];
    const color = PALETTE[i % PALETTE.length];
    const x = item.x * scale, y = item.y * scale;
    const w = item.w * scale, h = item.h * scale;

    ctx.globalAlpha = 0.82;
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);

    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#0d0f14';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x, y, w, h);

    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.font = 'bold ' + Math.max(9, Math.min(13, w / 5)) + 'px DM Mono, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = item.w.toFixed(1) + 'x' + item.h.toFixed(1);
    if (w > 28 && h > 14) {
      ctx.fillText(label, x + w / 2, y + h / 2);
    }
  }
  ctx.globalAlpha = 1;
}

function runOptimization() {
  const items = getCargoData();
  if (items.length === 0) {
    alert('Adicione ao menos uma carga valida.');
    return;
  }

  const truckC = parseFloat(document.getElementById('truck-c').value) || 14;
  const truckL = parseFloat(document.getElementById('truck-l').value) || 2.6;
  const truckMaxW = parseFloat(document.getElementById('truck-w').value) || 30;
  const margin = parseFloat(document.getElementById('truck-margin').value) || 0;
  const allowRotate = document.getElementById('allow-rotate').checked;

  const trucks = pack2DMaximalRectangles(items, truckC, truckL, truckMaxW, margin, allowRotate);

  const panel = document.getElementById('results-panel');
  const totalItems = items.length;
  const utilizations = trucks.map(function(t) {
    const used = t.items.reduce(function(s, i) { return s + i.w * i.h; }, 0);
    return used / (truckC * truckL) * 100;
  });
  const avgUtil = utilizations.reduce(function(a, b) { return a + b; }, 0) / utilizations.length;

  let html = '<div class="stats-bar">' +
    '<div class="stat-card warn"><div class="val">' + trucks.length + '</div><div class="lbl">Carretas</div></div>' +
    '<div class="stat-card"><div class="val">' + totalItems + '</div><div class="lbl">Pecas</div></div>' +
    '<div class="stat-card ' + (avgUtil >= 75 ? 'good' : avgUtil >= 50 ? '' : 'warn') + '"><div class="val">' + avgUtil.toFixed(0) + '%</div><div class="lbl">Ocupacao</div></div>' +
    '<div class="stat-card"><div class="val">' + truckC + 'x' + truckL + '</div><div class="lbl">Dimensao</div></div>' +
    '</div><div class="trucks-grid">';

  for (let ti = 0; ti < trucks.length; ti++) {
    const truck = trucks[ti];
    const used = truck.items.reduce(function(s, i) { return s + i.w * i.h; }, 0);
    const util = used / (truckC * truckL) * 100;
    const utilClass = util >= 75 ? 'high' : util >= 50 ? 'mid' : 'low';
    const canvasId = 'canvas-' + ti;

    html += '<div class="truck-card"><div class="truck-card-header">' +
      '<div class="truck-id">Carreta <span>#' + (ti + 1) + '</span></div>' +
      '<span class="truck-util ' + utilClass + '">' + util.toFixed(1) + '%</span></div>' +
      '<div class="truck-canvas-wrap"><canvas id="' + canvasId + '" class="truck-canvas"></canvas></div>' +
      '<div class="truck-cargo-list">';

    for (let ii = 0; ii < truck.items.length; ii++) {
      const item = truck.items[ii];
      const color = PALETTE[ii % PALETTE.length];
      const weightDisplay = item.p > 0 ? '<div class="ci-dim" style="margin-left:6px">' + item.p + 't</div>' : '';
      html += '<div class="cargo-item-row">' +
        '<div class="dot" style="background:' + color + '"></div>' +
        '<div class="ci-name">' + item.desc + '</div>' +
        '<div class="ci-dim">' + item.w.toFixed(2) + 'm x ' + item.h.toFixed(2) + 'm</div>' +
        weightDisplay + '</div>';
    }

    const wUtil = truckMaxW > 0 ? (truck.weightUsed / truckMaxW * 100).toFixed(0) : '-';
    html += '<div style="margin-top:8px; padding-top:8px; border-top:1px solid rgba(255,255,255,0.06);">' +
      '<span style="font-family:DM Mono,monospace;font-size:10px;color:var(--text-muted)">Area: ' + util.toFixed(1) + '% | Peso: ' + truck.weightUsed.toFixed(2) + 't (' + wUtil + '%)</span>' +
      '</div></div></div>';
  }

  html += '</div>';
  panel.innerHTML = html;

  setTimeout(function() {
    for (let ti = 0; ti < trucks.length; ti++) {
      const canvas = document.getElementById('canvas-' + ti);
      if (canvas) drawTruck(canvas, trucks[ti], truckC, truckL);
    }
  }, 100);
}

loadExample();
</script>
