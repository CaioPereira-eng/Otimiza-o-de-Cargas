<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CargoFit - Otimizador de Cargas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #14171f;
    --surface2: #1c2030;
    --border: #272c3d;
    --accent: #f5c518;
    --accent2: #ff6b35;
    --text: #e8eaf0;
    --text-muted: #5a6080;
    --truck-bg: #1a2035;
    --truck-border: #2a3555;
    --success: #3dd68c;
    --danger: #ff4d6d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  header .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  header .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  header .badge {
    margin-left: auto;
    background: var(--accent);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .app {
    display: grid;
    grid-template-columns: 420px 1fr;
    height: calc(100vh - 64px);
  }

  .panel-left {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-section {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .panel-section h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .truck-config {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .field-group label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
  }
  .field-group input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field-group input:focus { border-color: var(--accent); }
  .rotate-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .rotate-toggle input { accent-color: var(--accent); width: 14px; height: 14px; }
  .rotate-toggle label { font-size: 12px; color: var(--text-muted); cursor: pointer; }
  .tip {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 8px;
    padding: 6px 10px;
    background: var(--bg);
    border-left: 2px solid var(--accent);
    border-radius: 0 3px 3px 0;
  }

  .cargo-section {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 20px 24px;
  }
  .cargo-section h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .cargo-header {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    padding: 0 0 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .cargo-header span {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .cargo-header .h-desc { flex: 2; }
  .cargo-header .h-num { flex: 1; text-align: center; }
  .cargo-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
  }
  .cargo-row {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .cargo-row input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    border-radius: 3px;
  }
  .cargo-row .inp-desc { flex: 2; }
  .cargo-row .inp-num { flex: 1; text-align: center; }
  .cargo-row .btn-del {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
  }
  .cargo-row .btn-del:hover { color: var(--danger); }

  .cargo-actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .btn {
    padding: 9px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary {
    background: var(--accent);
    color: #000;
    font-weight: 600;
  }
  .btn-primary:hover { background: #ffd740; transform: translateY(-1px); }
  .btn-run {
    width: 100%;
    padding: 14px;
    font-size: 14px;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 3px;
  }
  .btn-danger { background: rgba(255,77,109,0.2); border: 1px solid var(--danger); color: var(--danger); }
  .btn-danger:hover { background: rgba(255,77,109,0.35); }

  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 4px;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    margin-bottom: 12px;
    transition: all 0.2s;
  }
  .upload-zone:hover { border-color: var(--accent); color: var(--accent); background: rgba(245,197,24,0.04); }
  #file-input { display: none; }

  .panel-right {
    overflow-y: auto;
    padding: 24px 28px;
  }
  .stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 18px;
    text-align: center;
  }
  .stat-card .val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
  }
  .stat-card .lbl {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }
  .trucks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
  }
  .truck-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .truck-card-header {
    background: var(--surface2);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .truck-id {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
  }
  .truck-id span { color: var(--accent); }
  .truck-util {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 2px;
  }
  .truck-util.high { background: rgba(61,214,140,0.15); color: var(--success); }
  .truck-editor {
    width: 100%;
    height: 220px;
    background: var(--truck-bg);
    border: 2px solid #2a3a6a;
    position: relative;
    overflow: hidden;
    border-radius: 4px;
  }
  .cargo-box {
    position: absolute;
    border: 2px solid rgba(0,0,0,0.4);
    border-radius: 3px;
    cursor: grab;
    user-select: none;
    transition: box-shadow 0.1s;
  }
  .cargo-box:hover { box-shadow: 0 0 0 2px rgba(255,255,255,0.3); }
  .cargo-box.dragging { opacity: 0.8; cursor: grabbing; }
  .cargo-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: bold;
    color: black;
    text-align: center;
    pointer-events: none;
  }
  .truck-cargo-list {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .cargo-item-row {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 4px 0;
    font-size: 12px;
  }
  .dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .unplaced-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px;
    margin-top: 20px;
  }
  .unplaced-title {
    font-family: 'Bebas Neue';
    font-size: 20px;
    color: var(--danger);
    margin-bottom: 12px;
  }
  #unplaced-items {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .unplaced-box {
    padding: 8px 12px;
    background: rgba(255,77,109,0.15);
    border: 1px solid var(--danger);
    border-radius: 4px;
    font-family: 'DM Mono';
    font-size: 11px;
    cursor: grab;
  }
  .log-box {
    margin-top: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px;
  }
  .log-title {
    font-family: 'Bebas Neue';
    color: var(--accent);
    font-size: 20px;
    margin-bottom: 10px;
  }
  .log-content {
    font-family: 'DM Mono';
    font-size: 12px;
    line-height: 1.6;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<header>
  <div>
    <div class="logo">🚛 CargoFit</div>
    <div class="subtitle">Otimizador de Posicionamento de Cargas</div>
  </div>
  <div class="badge">Maximal Rectangles + Drag & Drop</div>
</header>

<div class="app">
  <div class="panel-left">
    <div class="panel-section">
      <h3>Configuração da Carreta</h3>
      <div class="truck-config">
        <div class="field-group"><label>Comprimento (m)</label><input type="number" id="truck-c" value="14" step="0.1" min="1"></div>
        <div class="field-group"><label>Largura (m)</label><input type="number" id="truck-l" value="2.6" step="0.1" min="0.5"></div>
        <div class="field-group"><label>Peso Max. (t)</label><input type="number" id="truck-w" value="30" step="0.5" min="1"></div>
        <div class="field-group"><label>Margem (m)</label><input type="number" id="truck-margin" value="0.1" step="0.05" min="0"></div>
      </div>
      <div class="rotate-toggle"><input type="checkbox" id="allow-rotate" checked> <label>Permitir rotação 90°</label></div>
      <div class="tip">Padrão: 14m x 2,6m | 30t</div>
    </div>

    <div class="cargo-section">
      <h3>Lista de Cargas</h3>
      <div class="upload-zone" onclick="document.getElementById('file-input').click()">📂 Importar planilha (Excel/CSV)</div>
      <input type="file" id="file-input" accept=".csv,.xlsx,.xls">
      <div class="cargo-header"><span class="h-desc">Descrição</span><span class="h-num">C (m)</span><span class="h-num">L (m)</span><span class="h-num">P (t)</span><span class="h-num">Qtd</span><span style="width:24px"></span></div>
      <div class="cargo-list" id="cargo-list"></div>
      <div class="cargo-actions">
        <button class="btn btn-ghost" onclick="addCargoRow()">+ Adicionar</button>
        <button class="btn btn-ghost" onclick="clearAllCargos()">Limpar</button>
        <button class="btn btn-ghost" onclick="loadExample()">Exemplo</button>
      </div>
      <button class="btn btn-primary btn-run" style="margin-top:16px" onclick="runOptimization()">🚀 OTIMIZAR</button>
    </div>
  </div>

  <div class="panel-right" id="results-panel">
    <div class="empty-state">⚙️ Configure as cargas e clique em Otimizar</div>
  </div>
</div>

<script>
  // -------------------- GLOBALS --------------------
  let cargoRows = [], rowId = 0;
  let GLOBAL_TRUCKS = [];
  let UNPLACED_ITEMS = [];
  let CURRENT_DRAG = null;
  let preventedCollisions = 0, rotatedItemsCount = 0;
  const PALETTE = ['#f5c518','#ff6b35','#3dd68c','#4f8ef7','#e040fb','#00bcd4','#ff5252','#69f0ae','#ffab40','#b388ff'];

  // helpers
  function rectanglesOverlap(a,b) {
    return !(a.x + a.w <= b.x || b.x + b.w <= a.x || a.y + a.h <= b.y || b.y + b.h <= a.y);
  }
  function intersects(a,b) {
    return !(a.x >= b.x+b.w || a.x+a.w <= b.x || a.y >= b.y+b.h || a.y+a.h <= b.y);
  }

  // -------------------- UI CARGO ROWS --------------------
  function addCargoRow(desc='', c='', l='', p='', qty='1') {
    const id = rowId++;
    cargoRows.push(id);
    const container = document.getElementById('cargo-list');
    const div = document.createElement('div'); div.className = 'cargo-row'; div.id = `row-${id}`;
    div.innerHTML = `
      <input class="inp-desc" placeholder="Descrição" value="${desc.replace(/"/g, '&quot;')}" data-field="desc">
      <input class="inp-num" type="number" step="0.01" placeholder="C" value="${c}" data-field="c">
      <input class="inp-num" type="number" step="0.01" placeholder="L" value="${l}" data-field="l">
      <input class="inp-num" type="number" step="0.01" placeholder="P" value="${p}" data-field="p">
      <input class="inp-num" type="number" step="1" placeholder="Qtd" value="${qty}" data-field="qty">
      <button class="btn-del" onclick="removeRow(${id})">✕</button>
    `;
    container.appendChild(div);
  }
  window.removeRow = (id) => {
    document.getElementById(`row-${id}`)?.remove();
    cargoRows = cargoRows.filter(r => r !== id);
  };
  window.clearAllCargos = () => {
    document.getElementById('cargo-list').innerHTML = '';
    cargoRows = []; rowId = 0;
  };
  function getCargoData() {
    const items = [];
    document.querySelectorAll('.cargo-row').forEach(row => {
      const desc = row.querySelector('[data-field="desc"]')?.value.trim() || 'Carga';
      const c = parseFloat(row.querySelector('[data-field="c"]').value);
      const l = parseFloat(row.querySelector('[data-field="l"]').value);
      const p = parseFloat(row.querySelector('[data-field="p"]').value) || 0;
      const qty = parseInt(row.querySelector('[data-field="qty"]').value) || 1;
      if(!isNaN(c) && c>0 && !isNaN(l) && l>0) {
        for(let i=0;i<qty;i++) items.push({ desc: qty>1 ? `${desc} (${i+1})` : desc, c, l, p });
      }
    });
    return items;
  }

  function loadExample() {
    clearAllCargos();
    [[ 'Viga W460x82', 12, 0.46, 0.984, 2 ], [ 'Viga W250x38', 12, 0.262, 0.462, 3 ], [ 'TUBO 12"', 12, 0.304, 0.135, 4 ], [ 'TUBO 10"', 11, 0.254, 0.153, 3 ]].forEach(i => addCargoRow(i[0], i[1], i[2], i[3], i[4]));
  }

  // ---------- IMPORTAÇÃO CORRIGIDA para colunas: C, L, A (ignorado), P (t), Quant. ----------
  function normalizeHeader(str) {
    return String(str || '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }
  function findColumnIndex(headers, expectedPatterns) {
    for (let i = 0; i < headers.length; i++) {
      const h = normalizeHeader(headers[i]);
      for (let pattern of expectedPatterns) {
        if (h === pattern || h.includes(pattern)) return i;
      }
    }
    return -1;
  }
  function importFromRows(rows) {
    clearAllCargos();
    if (!rows.length) return;
    // primeira linha não vazia como cabeçalho?
    let headerRow = null;
    let dataStart = 0;
    for (let i = 0; i < Math.min(5, rows.length); i++) {
      const row = rows[i];
      if (!row || row.length < 2) continue;
      const headerStr = row.map(cell => normalizeHeader(String(cell))).join(' ');
      if (headerStr.includes('c') && (headerStr.includes('l') || headerStr.includes('larg')) && headerStr.includes('p')) {
        headerRow = row;
        dataStart = i+1;
        break;
      }
    }
    if (!headerRow) {
      // assume que primeira linha é dados
      headerRow = null;
      dataStart = 0;
    }
    // mapeamento exato: "c", "l", "p (t)", "quant"
    let idxC = -1, idxL = -1, idxP = -1, idxQuant = -1, idxDesc = -1;
    if (headerRow) {
      const headers = headerRow.map(cell => normalizeHeader(String(cell)));
      idxC = findColumnIndex(headers, ['c', 'compr', 'comprimento']);
      idxL = findColumnIndex(headers, ['l', 'larg', 'largura']);
      idxP = findColumnIndex(headers, ['p', 'peso', 'p (t)', 'p(t)']);
      idxQuant = findColumnIndex(headers, ['quant', 'qtd', 'quantidade', 'quant.']);
      idxDesc = findColumnIndex(headers, ['desc', 'descricao', 'nome', 'carga', 'item']);
    } else {
      // fallback: ordem padrão: col0=desc, col1=C, col2=L, col3=P, col4=Quant
      idxDesc = 0; idxC = 1; idxL = 2; idxP = 3; idxQuant = 4;
    }
    // se não achou algum essencial, tenta ordem padrão
    if (idxC === -1 || idxL === -1) {
      idxC = 1; idxL = 2; if(idxP===-1) idxP=3; if(idxQuant===-1) idxQuant=4; if(idxDesc===-1) idxDesc=0;
    }
    for (let i = dataStart; i < rows.length; i++) {
      const row = rows[i];
      if (!row || row.length < 2) continue;
      const desc = (idxDesc !== -1 && row[idxDesc]) ? String(row[idxDesc]).trim() : `Carga_${i}`;
      const cRaw = idxC !== -1 ? String(row[idxC]).replace(',', '.') : '0';
      const lRaw = idxL !== -1 ? String(row[idxL]).replace(',', '.') : '0';
      const pRaw = (idxP !== -1 && row[idxP]) ? String(row[idxP]).replace(',', '.') : '0';
      let qty = 1;
      if (idxQuant !== -1 && row[idxQuant]) {
        qty = parseInt(String(row[idxQuant]).replace(/\./g,'')) || 1;
        if (isNaN(qty) || qty < 1) qty = 1;
      }
      const c = parseFloat(cRaw);
      const l = parseFloat(lRaw);
      const p = parseFloat(pRaw) || 0;
      if (!isNaN(c) && c > 0 && !isNaN(l) && l > 0 && desc) {
        addCargoRow(desc.substring(0, 50), c, l, p, qty);
      }
    }
    if (cargoRows.length === 0) alert('Nenhuma carga válida importada. Verifique se as colunas estão nomeadas como: C, L, P (t), Quant. (descrição opcional).');
  }

  document.getElementById('file-input').addEventListener('change', e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      let rows = [];
      if(file.name.match(/\.xlsx?$/)) {
        const wb = XLSX.read(ev.target.result, { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
      } else {
        const text = ev.target.result;
        rows = text.split(/\r?\n/).filter(l=>l.trim()).map(l=> l.split(/,|\t|;/).map(cell=>cell.trim()));
      }
      importFromRows(rows);
    };
    if(file.name.match(/\.xlsx?$/)) reader.readAsArrayBuffer(file);
    else reader.readAsText(file, 'UTF-8');
    e.target.value = '';
  });

  // -------------------- MAXIMAL RECTANGLES PACKER --------------------
  class MaximalRectangle { constructor(x,y,w,h) { this.x=x; this.y=y; this.w=w; this.h=h; } }
  function splitFreeRects(freeRects, usedRect) {
    for(let i=freeRects.length-1; i>=0; i--) {
      const r = freeRects[i];
      if(!intersects(r, usedRect)) continue;
      freeRects.splice(i,1);
      if(usedRect.x > r.x) freeRects.push(new MaximalRectangle(r.x, r.y, usedRect.x - r.x, r.h));
      if(usedRect.x + usedRect.w < r.x + r.w) freeRects.push(new MaximalRectangle(usedRect.x+usedRect.w, r.y, r.x+r.w - (usedRect.x+usedRect.w), r.h));
      if(usedRect.y > r.y) freeRects.push(new MaximalRectangle(r.x, r.y, r.w, usedRect.y - r.y));
      if(usedRect.y + usedRect.h < r.y + r.h) freeRects.push(new MaximalRectangle(r.x, usedRect.y+usedRect.h, r.w, r.y+r.h - (usedRect.y+usedRect.h)));
    }
  }
  function pruneRects(freeRects) {
    for(let i=freeRects.length-1;i>=0;i--) {
      const a=freeRects[i];
      if(a.w<=0.001 || a.h<=0.001) { freeRects.splice(i,1); continue; }
      for(let j=freeRects.length-1;j>=0;j--) if(i!==j && freeRects[j].x<=a.x && freeRects[j].y<=a.y && freeRects[j].x+freeRects[j].w>=a.x+a.w && freeRects[j].y+freeRects[j].h>=a.y+a.h) { freeRects.splice(i,1); break; }
    }
  }
  function tryPlaceMaximal(truck, item, truckC, truckL, maxW, margin, allowRotate) {
    if(truck.weightUsed + item.p > maxW) return false;
    const variants = [[item.c, item.l]];
    if(allowRotate && Math.abs(item.c-item.l)>0.001) variants.push([item.l, item.c]);
    let best=null, bestRect=null, bestShort=Infinity, bestLong=Infinity;
    for(let rect of truck.maxRects) {
      for(let [w,h] of variants) {
        const wm = w + margin*2, hm = h + margin*2;
        if(wm <= rect.w && hm <= rect.h) {
          const short = Math.min(rect.w-wm, rect.h-hm), long = Math.max(rect.w-wm, rect.h-hm);
          if(short < bestShort || (short===bestShort && long<bestLong)) {
            best = { x:rect.x, y:rect.y, w, h, rotated: (Math.abs(w-item.c)>0.001) };
            bestRect = rect;
            bestShort = short; bestLong = long;
          }
        }
      }
    }
    if(!best) return false;
    splitFreeRects(truck.maxRects, { x:best.x, y:best.y, w:best.w+margin*2, h:best.h+margin*2 });
    pruneRects(truck.maxRects);
    const newItem = { x:best.x+margin, y:best.y+margin, w:best.w, h:best.h, desc:item.desc, p:item.p, rotated:best.rotated, c:item.c, l:item.l };
    for(let e of truck.items) if(rectanglesOverlap(e, newItem)) return false;
    if(newItem.x<0 || newItem.y<0 || newItem.x+newItem.w>truckC || newItem.y+newItem.h>truckL) return false;
    truck.items.push(newItem);
    truck.weightUsed += item.p;
    if(best.rotated) rotatedItemsCount++;
    return true;
  }
  function pack2DMaximalRectangles(items, truckC, truckL, maxW, margin, allowRotate) {
    const sorted = [...items].sort((a,b)=> (b.c*b.l)-(a.c*a.l));
    const trucks = [], unplaced = [];
    for(let item of sorted) {
      let placed=false;
      for(let t of trucks) if(tryPlaceMaximal(t, item, truckC, truckL, maxW, margin, allowRotate)) { placed=true; break; }
      if(!placed) {
        const newTruck = { maxRects:[new MaximalRectangle(0,0,truckC,truckL)], items:[], weightUsed:0 };
        if(tryPlaceMaximal(newTruck, item, truckC, truckL, maxW, margin, allowRotate)) trucks.push(newTruck);
        else unplaced.push({ ...item });
      }
    }
    return { trucks, unplaced };
  }

  // -------------------- VALIDAÇÕES --------------------
  function validateTruck(truck, truckC, truckL) {
    const errors=[];
    for(let i=0;i<truck.items.length;i++) {
      const a=truck.items[i];
      if(a.x<0||a.y<0||a.x+a.w>truckC||a.y+a.h>truckL) errors.push(`Fora limites: ${a.desc}`);
      for(let j=i+1;j<truck.items.length;j++) if(rectanglesOverlap(a, truck.items[j])) errors.push(`Overlap: ${a.desc} / ${truck.items[j].desc}`);
    }
    return errors;
  }

  // -------------------- DRAG & DROP GLOBAL --------------------
  function enableDrag(element, item, sourceTruck) {
    element.addEventListener('mousedown', e => {
      e.preventDefault();
      if(CURRENT_DRAG) return;
      CURRENT_DRAG = { item, sourceTruck, startX:e.clientX, startY:e.clientY };
      element.classList.add('dragging');
      const ghost = element.cloneNode(true);
      ghost.style.position='fixed'; ghost.style.zIndex='99999'; ghost.style.pointerEvents='none'; ghost.style.opacity='0.8';
      document.body.appendChild(ghost);
      const moveGhost = (ev) => { ghost.style.left = (ev.clientX - element.offsetWidth/2)+'px'; ghost.style.top = (ev.clientY - element.offsetHeight/2)+'px'; highlightDropZones(ev.clientX, ev.clientY); };
      const onMove = (ev) => moveGhost(ev);
      const onUp = (ev) => {
        document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp);
        ghost.remove(); element.classList.remove('dragging'); clearDropHighlights();
        finishDrop(ev);
        CURRENT_DRAG = null;
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }
  function highlightDropZones(x,y) {
    clearDropHighlights();
    document.querySelectorAll('.truck-editor').forEach(el => {
      const rect = el.getBoundingClientRect();
      if(x>=rect.left && x<=rect.right && y>=rect.top && y<=rect.bottom) el.classList.add('drop-hover');
    });
  }
  function clearDropHighlights() { document.querySelectorAll('.truck-editor').forEach(el => el.classList.remove('drop-hover')); }
  function finishDrop(e) {
    if(!CURRENT_DRAG) return;
    const { item, sourceTruck } = CURRENT_DRAG;
    let targetTruck = null, targetZone = null;
    document.querySelectorAll('.truck-editor').forEach(zone => {
      const rect = zone.getBoundingClientRect();
      if(e.clientX>=rect.left && e.clientX<=rect.right && e.clientY>=rect.top && e.clientY<=rect.bottom) {
        targetZone = zone;
        const idx = parseInt(zone.dataset.truck);
        if(!isNaN(idx)) targetTruck = GLOBAL_TRUCKS[idx];
      }
    });
    if(!targetTruck) { rerenderResults(); return; }
    if(sourceTruck) sourceTruck.items = sourceTruck.items.filter(i => i !== item);
    else UNPLACED_ITEMS = UNPLACED_ITEMS.filter(i => i !== item);
    const rectCanvas = targetZone.getBoundingClientRect();
    const { truckC, truckL } = getTruckDims();
    const scaleX = rectCanvas.width / truckC, scaleY = rectCanvas.height / truckL;
    item.x = (e.clientX - rectCanvas.left)/scaleX - item.w/2;
    item.y = (e.clientY - rectCanvas.top)/scaleY - item.h/2;
    targetTruck.items.push(item);
    if(!validateItemPosition(item, targetTruck)) {
      const success = snapToBestPosition(item, targetTruck);
      if(!success) {
        targetTruck.items = targetTruck.items.filter(i => i !== item);
        (sourceTruck ? sourceTruck.items : UNPLACED_ITEMS).push(item);
      }
    }
    updateWeights();
    rerenderResults();
  }
  function validateItemPosition(item, truck) {
    const { truckC, truckL, truckMaxW } = getTruckDims();
    if(item.x<0||item.y<0||item.x+item.w>truckC||item.y+item.h>truckL) return false;
    let totalWeight = item.p;
    for(let other of truck.items) if(other !== item) { if(rectanglesOverlap(item, other)) return false; totalWeight += other.p; }
    return totalWeight <= truckMaxW;
  }
  function snapToBestPosition(item, truck) {
    const { truckC, truckL } = getTruckDims();
    for(let y=0; y<=truckL-item.h; y+=0.05) for(let x=0; x<=truckC-item.w; x+=0.05) {
      item.x=x; item.y=y;
      if(validateItemPosition(item, truck)) return true;
    }
    return false;
  }
  function getTruckDims() {
    return {
      truckC: parseFloat(document.getElementById('truck-c').value)||14,
      truckL: parseFloat(document.getElementById('truck-l').value)||2.6,
      truckMaxW: parseFloat(document.getElementById('truck-w').value)||30
    };
  }
  function updateWeights() { GLOBAL_TRUCKS.forEach(t => t.weightUsed = t.items.reduce((s,i)=>s+(i.p||0),0)); }

  // -------------------- RENDER VISUAL --------------------
  function renderTruckEditor(container, truck, truckC, truckL, idx) {
    container.innerHTML = '';
    const w = container.clientWidth, h = container.clientHeight;
    if(!w || !h) return;
    const sx = w/truckC, sy = h/truckL;
    truck.items.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'cargo-box';
      div.style.left = (item.x * sx)+'px'; div.style.top = (item.y * sy)+'px';
      div.style.width = (item.w * sx)+'px'; div.style.height = (item.h * sy)+'px';
      div.style.background = PALETTE[i%PALETTE.length];
      div.innerHTML = `<div class="cargo-label">${item.desc}</div>`;
      const rotBtn = document.createElement('button');
      rotBtn.innerHTML = '↻'; rotBtn.style.position='absolute'; rotBtn.style.top='2px'; rotBtn.style.right='2px';
      rotBtn.style.zIndex='20'; rotBtn.style.fontSize='10px'; rotBtn.style.background='rgba(0,0,0,0.5)'; rotBtn.style.color='white';
      rotBtn.style.border='none'; rotBtn.style.borderRadius='2px'; rotBtn.style.cursor='pointer';
      rotBtn.addEventListener('click', (ev) => { ev.stopPropagation();
        const oldW=item.w, oldH=item.h; item.w=item.h; item.h=oldW; item.rotated=!item.rotated;
        if(!validateItemPosition(item, truck)) { item.w=oldW; item.h=oldH; item.rotated=!item.rotated; alert('Rotação não permitida: sem espaço.'); }
        rerenderResults();
      });
      div.appendChild(rotBtn);
      enableDrag(div, item, truck);
      container.appendChild(div);
    });
  }
  function renderUnplaced() {
    const container = document.getElementById('unplaced-items');
    if(!container) return;
    container.innerHTML = '';
    UNPLACED_ITEMS.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'unplaced-box';
      div.innerHTML = `<strong>${item.desc}</strong><br>${item.w.toFixed(2)}m x ${item.h.toFixed(2)}m${item.p?` | ${item.p}t`:''}`;
      enableDrag(div, item, null);
      container.appendChild(div);
    });
  }
  function rerenderResults() {
    const { truckC, truckL, truckMaxW } = getTruckDims();
    const panel = document.getElementById('results-panel');
    let html = `<div class="stats-bar">
      <div class="stat-card"><div class="val">${GLOBAL_TRUCKS.length}</div><div class="lbl">Carretas</div></div>
      <div class="stat-card"><div class="val">${GLOBAL_TRUCKS.reduce((a,t)=>a+t.items.length,0)}</div><div class="lbl">Alocadas</div></div>
      <div class="stat-card"><div class="val">${UNPLACED_ITEMS.length}</div><div class="lbl">Não Alocadas</div></div>
      <button class="btn btn-primary" onclick="addNewTruck()" style="margin-left:auto">+ CARRETA</button>
    </div><div class="trucks-grid">`;
    GLOBAL_TRUCKS.forEach((truck, ti) => {
      const usedArea = truck.items.reduce((s,i)=>s+i.w*i.h,0);
      const util = (usedArea/(truckC*truckL)*100)||0;
      html += `<div class="truck-card"><div class="truck-card-header"><div class="truck-id">Carreta <span>#${ti+1}</span></div>
      <span class="truck-util ${util>=75?'high':util>=50?'mid':'low'}">${util.toFixed(1)}%</span>
      <button class="btn btn-danger" style="padding:4px 8px; margin-left:auto" onclick="removeTruckById(${ti})">×</button></div>
      <div class="truck-canvas-wrap"><div id="canvas-${ti}" class="truck-editor" data-truck="${ti}"></div></div>
      <div class="truck-cargo-list">${truck.items.map((it,ii)=>`<div class="cargo-item-row"><div class="dot" style="background:${PALETTE[ii%PALETTE.length]}"></div><div class="ci-name">${it.desc}</div><div>${it.w.toFixed(2)}x${it.h.toFixed(2)}m</div><div style="margin-left:6px">${it.p?it.p+'t':''}</div></div>`).join('')}
      <div style="margin-top:8px;border-top:1px solid var(--border);padding-top:6px;font-size:10px">⚖️ ${truck.weightUsed.toFixed(1)}t / ${truckMaxW}t &nbsp;📐 ${util.toFixed(1)}%</div></div></div>`;
    });
    html += `</div><div class="unplaced-section"><div class="unplaced-title">🚫 NÃO ALOCADAS (${UNPLACED_ITEMS.length})</div><div id="unplaced-items"></div></div>`;
    panel.innerHTML = html;
    setTimeout(() => {
      GLOBAL_TRUCKS.forEach((_,ti) => {
        const canvas = document.getElementById(`canvas-${ti}`);
        if(canvas) renderTruckEditor(canvas, GLOBAL_TRUCKS[ti], truckC, truckL, ti);
      });
      renderUnplaced();
    }, 50);
  }
  window.addNewTruck = () => { GLOBAL_TRUCKS.push({ maxRects:[], items:[], weightUsed:0 }); rerenderResults(); };
  window.removeTruckById = (idx) => { UNPLACED_ITEMS.push(...GLOBAL_TRUCKS[idx].items); GLOBAL_TRUCKS.splice(idx,1); rerenderResults(); };
  function resetCounters() { preventedCollisions=0; rotatedItemsCount=0; }
  function runOptimization() {
    const items = getCargoData();
    if(items.length===0) { alert('Adicione pelo menos uma carga.'); return; }
    resetCounters();
    const truckC = parseFloat(document.getElementById('truck-c').value)||14;
    const truckL = parseFloat(document.getElementById('truck-l').value)||2.6;
    const truckMaxW = parseFloat(document.getElementById('truck-w').value)||30;
    const margin = parseFloat(document.getElementById('truck-margin').value)||0;
    const allowRotate = document.getElementById('allow-rotate').checked;
    const { trucks, unplaced } = pack2DMaximalRectangles(items, truckC, truckL, truckMaxW, margin, allowRotate);
    GLOBAL_TRUCKS = trucks;
    UNPLACED_ITEMS = unplaced;
    updateWeights();
    rerenderResults();
  }
  // exemplo inicial
  loadExample();
  setTimeout(() => runOptimization(), 100);
</script>
</body>
